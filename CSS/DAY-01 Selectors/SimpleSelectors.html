<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: white;
            background-color: brown;
        }
        /* id Selector*/
        #tvk{
            color: red;
            background-color: yellow;
        }
        /* Class Selector*/
        .tn{
            color: red;
            border: 1px solid salmon;
            background-color: white;
        }
        /* TagName or Element Name Selector*/
        div {
            width: 200px;
            height: 200px;
            background-color: pink;

        }
        /* Universal Selector*/
        *{
            background-color: black;
        }
    </style>
</head>
<!-- 1st priority is id
 2nd ........class
 3rd ........tagName or element name
 4th ........universal 
 -->
<body>
    <h1>1. Simple Selectors ---- 4 types <br>
        id,class, tagname, universal
    </h1>
    <h2 id="tvk">Today TVK will won. Thalapathy is CM.</h2>
    <h3> May be DMK is Opposite Party.</h3><hr>

    <p class="tn">ADMK </p>
    <p class="tn">BJP </p>
    <p class="tn">DMK </p><hr>
    <div></div>
</body>
</html>
