<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div h1:first-child {
        background-color: aqua;
      }
      div h1:last-child {
        background-color: blue;
      }
      div p:nth-child(5) {
        background-color: pink;
      }
      div p:first-child {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <h1>Structural Pseudo Class Selectors</h1>
    <div>
      <!-- <span>Google</span> -->
      <h1>Heading-1</h1>
      <h1>Heading-2</h1>
      <p>Paragraph-1</p>
      <h1>Heading-3</h1>
      <p>Paragraph-2</p>
      <h1>Heading-4</h1>
    </div>
  </body>
</html>
