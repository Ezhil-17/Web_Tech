<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      a:link {
        color: red;
      }
      a:visited {
        color: green;
      }
      a:hover {
        background-color: black;
        color: wheat;
        /* text decoration it will remove in underline for active link */
        text-decoration: none;
      }
      div {
        width: 100px;
        height: 100px;
        border: 1px solid;
      }
      div:hover {
        background-color: purple;
      }
      #link5:active {
        color: aqua;
      }
      input:focus {
        border: 3px solid greenyellow;
      }
    </style>
  </head>
  <body>
    <h1>4. Pseudo-Class Selectors</h1>

    <!-- pseudo === meaning are false or dummy or fake name -->
    <!-- There are 3 types
      1.Dynamic pcs ----1.:link,2.:visited,3.:hover,4.:active,5.:focus.
      2.Structural pcs
      3.UI State pcs-->
    <a href="https://www.google.com/">Google</a>
    <a href="https://www.facebook.com/">Facebook</a>
    <a href="https://www.cricbuzz.com/">Cricbuzz</a>
    <a href="https://www.instagram.com/">Instagram</a>
    <br />
    <div></div>
    <hr />

    <a href="https://undraw.co/" id="link5">Undraw</a>
    <input type="text" />
  </body>
</html>
