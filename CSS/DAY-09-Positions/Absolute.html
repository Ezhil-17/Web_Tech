<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
        .box{
            width: 100px;
            height: 100px;
            color:white;
            text-align:center;
            line-height: 100px;
            }
            #box1{
                background-color:red;
                position: absolute;
                z-index: 10;
                   /*z-index is default value is 0.  */
                bottom: 0px;
                right: 10px;

            }
            #box2{
                background-color:   green;
                position:   absolute;
                z-index: 11;
                top:0px;
                left:0px;
            }
            #box3{
                background-color: blue;
                position: absolute;
                z-index: 50;
                bottom: 0;
            }

    </style>
</head>
<body>
    <h1></h1>
    <div class="box" id="box1">Box 1</div>
    <div class="box" id="box2">Box 2</div>
    <div class="box" id="box3">Box 3</div>

</body>
</html>
