<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .box {
        width: 500px;
        height: 300px;
        border: 1px solid black;
        margin: 25px auto;
        /* background:bg-image bg-repeat bg-position bg-size; */
        background: url(https://picsum.photos/400/200) no-repeat center/cover;
      }
      h1 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Background Shorthand Property</h1>
    <div class="box"></div>
  </body>
</html>
