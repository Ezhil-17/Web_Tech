<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        h1{
            /* margin-bottom: 20px; */
            margin: 0px 0px 20px 0px;

        }
        .box{
            width: 100%;
            height: 80vh;
            border: 1px solid;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTUbfsNBBS2oxkjTZ9y-42wvnfAH8QQgmK4Mw&s');
            background-repeat: no-repeat;
            background-position: center;
            background-size: auto 100%;
            /* background-size: cover; is default value */
        }
    </style>
</head>
<body>
    <!-- <h1>Background Properties in CSS</h1> -->
    <h1>Background-image:url("path") Demo</h1>
    <!-- .box#box$*1 -->
     <div class="box" id="box1"></div>
</body>
</html>
