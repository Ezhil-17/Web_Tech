<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: Georgia, "Times New Roman", Times, serif;
      }
      .box {
        width: 100%;
        height: 100vh;
        border: 2px solid black;
        text-align: center;
        line-height: 100vh;
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
      }
      h1 {
        font-size: 100px;
        color: white;
      }
      #box1 {
        background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRXGYsz70SSlYJNZJXBDAK0nEtu4aTLw6gNpQ&s);
      }
      #box2 {
        background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUPlsAgZ5OQ2acUDv3kb46PnBWSypTSQFrVw&s);
      }
      #box3 {
        background-image: url(https://wallpapers.com/images/hd/red-stranger-things-vecna-xhgrb64jzhfsnv71.jpg);
      }
      #box4 {
        background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTs9oI3033DzM06XzNAUNslgYgpASTC_5v4zQ&s);
      }
      #box5 {
        background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSg5TBKtoHEtqJNM6j6nkEQ9pVrQgHMG_8qrw&s);
      }
      #box6 {
        background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvLKxz85omaxIkd495Q8yGXlwxUnfnaR4N4g&s);
      }
    </style>
  </head>
  <body>
    <div class="box" id="box1">
      <h1>Eleven</h1>
    </div>
    <div class="box" id="box2">
      <h1>Mike</h1>
    </div>
    <div class="box" id="box3">
      <h1>Vecna</h1>
    </div>
    <div class="box" id="box4">
      <h1>Lucas</h1>
    </div>
    <div class="box" id="box5">
      <h1>Dustin</h1>
    </div>
    <div class="box" id="box6">
      <h1>Max</h1>
    </div>
  </body>
</html>
