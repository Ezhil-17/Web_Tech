<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>File Validations in HTML</h1>
    <form action="">
      <div>
        <label for="">Upload Resume: </label>
        <!-- To upload any file can add the attribute in "accept = ___" 
             example:
             accept = image/* or video/* or audio/* or .png or .pdf or .mp4 or image/.jpg or 
             video/.mp4 or .png,.pdf, .mp3 etc., -->
        <input type="file" accept=".pdf" multiple name="" id="" />
      </div>
      <br />
      <div>
        <label for="">Upload Profile</label>
        <input type="file" accept="image/*" name="" id="" />
      </div>
      <br />
      <div>
        <button>submit</button>
      </div>
    </form>
  </body>
</html>
