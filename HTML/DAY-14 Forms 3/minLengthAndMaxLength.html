<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>MinLength and MaxLength Attribute in HTML</h1>
    <form action="">
      <div>
        <!-- readonly attribute only you can see this number value not edit the text -->
        <label for="aadhar Number">Aadhar Number:</label>
        <input
          type="text"
          id="aadhar Number"
          name="aadhar Number"
          minlength="12"
          maxlength="12"
          value="1234 5678 9891"
          readonly
        />
      </div><br>
      <div>
        <label for="password">Password:</label>
        <input
          type="text"
          id="password"
          name="password"
          placeholder="Enter the Password of min 3 and max 8 Characters"
          size="50"
          minlength="3"
          maxlength="8"
        />
      </div><br>
      <br />
      <div>
        <button>Submit</button>
      </div>
    </form>
  </body>
</html>
