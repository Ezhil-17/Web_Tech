<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Min Max Attribute in HTML</h1>
    <form action="">
        <div>
            <label for="">
                Select a Course Price:
            </label>
            <input type="range" min="5000" max="20000" name="coursePrice" id="">

        </div><br>
        <div>
            <label for="">Select your Interview Slot</label>
            <input type="date" min="2026-05-02" max="2026-05-25" name="Slot" id="">
        </div><br>
        <div>
            <button>Submit</button>
        </div>
    </form>

</body>
</html>
