<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnOrdered   List</title>
</head>
<body>
    <h1>2. UnOrdered List in HTML</h1>
    <h2>Type is disc (default)</h2>
    <ul type="disc">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Fries</li>
        <li>Coke</li>
    </ul>
    <hr>

    <h2>Type is Circle</h2>
    <ul type="circle">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Fries</li>
        <li>Coke</li>
    </ul>
    <hr>

    <h2>Type is Square</h2>
    <ul type="Square">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Fries</li>
        <li>Coke</li>
    </ul>
    <hr>

    <h2>Type is none</h2>
    <ul type="none">
        <li>Pizza</li>
        <li>Burger</li>
        <li>Fries</li>
        <li>Coke</li>
    </ul>
    <hr>
    <!-- The UnOrdered List is not have a 'start' and 'reversed' -->
</body>
</html>
