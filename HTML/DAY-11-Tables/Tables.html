<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Tables in HTML</h1>

    <!-- table> tr*4 > td*3 -->
    <table border="1">
      <caption>
        <b>STUDENT DATA</b>
      </caption>
      <tr>
        <th>S.NO</th>
        <th>NAME</th>
        <th>AGE</th>
      </tr>
      <tr>
        <th>1.</th>
        <td>EZHILARASI AZHWAR</td>
        <td>22</td>
      </tr>
      <tr>
        <th>2.</th>
        <td>HARI</td>
        <!-- To merge the two row in particular cell -->
        <td rowspan="2">21</td>
      </tr>
      <tr>
        <th>3.</th>
        <td>RISHI</td>
        <!-- <td>21</td> -->
      </tr>
      <tr >
        <!-- To merge the two colomn in particular cell -->
        <th colspan="2">Total No.of Students</th>
        <td>3</td>
      </tr>
    </table>
  </body>
</html>
