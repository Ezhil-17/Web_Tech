<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>hspace and vspace in Marquee tag.</h1>
    <marquee
      behavior="scroll"
      direction="left"
      bgcolor="skyblue"
      scrollamount="20"
      hspace="50"
    >
      <h1>Equal space is created from left and right side</h1>
    </marquee>
    <marquee
      behavior="scroll"
      direction="left"
      bgcolor="lightgray"
      scrollamount="20"
      vspace="200"
    >
      <h1>Equal space is created from top and bottom side</h1>
    </marquee>
  </body>
</html>
