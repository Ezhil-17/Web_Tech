<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Marquee Tag in HTML</h1>
    <marquee behavior="scroll" direction="right" bgcolor="palegreen">
      This is a simple marquee example.
    </marquee>
    <!-- behavior attribute default value is "scroll" and 
     three 3  type 
     1.scroll
     2.alterante
     3.slide-->
    <!-- direction attribute default value is "left" -->
     <!-- scrollamount attribute controls the speed of the marquee.
      if you want to increase the speedd of the text.(default value=6ms)
       -->

       <!-- Scrolldelay= if you want to provide delay for marquee tag compare to normal speed.
        default value=86ms -->
    <h2><center>Text is moving form right to left side</center></h2>
    <br />
    <hr />
    <marquee behavior="scroll" direction="right" scrollamount="30">
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTjmXfwzuxsK-t44vVwI8TmOXyA0JCjhudXOQ&s"
        alt=""
      />
    </marquee>
  </body>
</html>
