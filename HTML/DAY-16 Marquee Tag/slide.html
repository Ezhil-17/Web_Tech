<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Marquee Tag = slide behavior</h1>
    <marquee
      behavior="slide"
      direction="left"
      bgcolor="palegreen"
      scrollamount="40"
    >
      <!-- This is moving from right to left and stop at the end of the page. It is
      not moving again. It is only moving one time. It is not moving again and
      again like scroll behavior. -->
      <h1>
        This text is moving from right to left and it will stop at the extreme
        right side of the page.
      </h1>
    </marquee>
  </body>
</html>
