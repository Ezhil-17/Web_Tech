<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
    <style>
        #head2{
            color: green;
        }
        #head3{
            color: purple;
        }
        .para{
            background-color: black;
            color: white; 
        }
    </style>
</head>
<body>
    <h1 style="color: blueviolet;">1. Core Attributes</h1>
    <!-- id Attributes -->

    <h2 id="head2">Heading-1</h2>
    <h2 id="head3">Heading-2</h2>
    <hr>
    <!-- Class Attributes , Titile Attributes(also called as Tooltip)-->
     <!-- p*3{Content-$} -->
    <p class="para" title="This is the paragraph-1">Content-1</p>
    <p class="para" >Content-2</p>
    <p class="para" title="This is the paragraph-3" >Content-3</p>
<!-- Style Attributes -->
 <div style="width: 100px; height: 100px; background-color: teal;"></div>
</body>
</html>
