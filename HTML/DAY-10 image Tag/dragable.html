<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Accesskey Attributes Tag -->
    <h1>Accesskey Attributes in Anchor Tag</h1>
    <h2>Alt + Alphabet</h2>
    <a accesskey="g" href="https://www.google.com">google</a>
    <!-- Alt + f is already predefine shortcut key . it cannot be use in accesskey ='f' -->
    <a accesskey="k" href="https://www.facebook.com">facebook</a>
    <a accesskey="i" href="https://www.instagram.com">instagram</a>

    <!-- Dragable Tag -->
     <h1>Draggable in Image Tag</h1>
     <img src="./Thar.png" alt="" width="300" height="300" draggable="true">
</body>
</html>
