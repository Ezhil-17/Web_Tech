<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Tab Index Attributes in Anchor Tag</h1>
    <!-- Tab index is used for tab button using shortcut key and which one is first selected in this link -->

    <a tabindex="2" href="https://www.google.com">google</a>
    <a tabindex="1" href="https://www.facebook.com">facebook</a>
    <a tabindex="3" href="https://www.instagram.com">instagram</a>
  </body>
</html>
