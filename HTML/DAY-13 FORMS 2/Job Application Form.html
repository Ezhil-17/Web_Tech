<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend><h1>Job Application Form</h1></legend>
        <table>
          <tr>
            <td>
              <label for="first-name">First Name:</label>
            </td>
            <td>
              <input type="text" id="first-name" name="first-name" />
            </td>
          </tr>
          <tr>
            <td><label for="">Last Name:</label></td>
            <td>
              <input type="text" />
            </td>
          </tr>
          <tr>
            <td><label for="">Email:</label></td>
            <td>
              <input type="email" />
            </td>
          </tr>
          <tr>
            <td><label for="">Phone:</label></td>
            <td>
              <input type="tel" />
            </td>
          </tr>
          <tr>
            <td><label for="">DOB:</label></td>
            <td>
              <input type="date" />
            </td>
          </tr>
          <tr>
            <td><label for="gender">Gender:</label></td>
            <td>
              <input type="radio" id="male" name="gender" value="male" />
              <label for="male">Male</label>
              <input type="radio" id="female" name="gender" value="female" />
              <label for="female">Female</label>
            </td>
          </tr>

          <tr>
            <td><label for="address">Address:</label></td>
            <td>
              <textarea
                name="address"
                id="address"
                cols="30"
                rows="5"
              ></textarea>
            </td>
          </tr>

          <tr>
            <td><label for="city">City:</label></td>
            <td>
              <input type="text" id="city" name="city" />
            </td>
          </tr>
          <tr>
            <td><label for="state">State:</label></td>
            <td>
              <input type="text" id="state" name="state" />
            </td>
          </tr>
          <tr>
            <td><label for="pin-code">Pin Code:</label></td>
            <td>
              <input type="text" id="pin-code" name="pin-code" />
            </td>
          </tr>
          <tr>
            <td><label for="position">Position Applied For:</label></td>
            <td>
              <input type="text" id="position" name="position" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="resume">Upload Resume:</label>
            </td>
            <td>
              <input type="file" id="resume" name="resume" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="linkedin">LinkedIn Profile:</label>
            </td>
            <td>
              <input type="url" id="linkedin" name="linkedin" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="available">Available Start Date:</label>
            </td>
            <td>
              <input type="date" id="available" name="available" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="">Expected Salary:</label>
            </td>
            <td>
              <input type="text" id="salary" name="salary" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="willing">Willing to Relocate:</label>
            </td>
            <td>
              <select name="willing" id="willing">
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>
              <button type="submit">Submit Application</button>
            </td>
          </tr>
        </table>
      </fieldset>
    </form>
  </body>
</html>
