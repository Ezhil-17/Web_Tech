<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>
      <center><mark>Student Registration Form</mark></center>
    </h1>
    <form action="">
      <fieldset>
        <legend>Personal Information</legend>
        <table>
          <tr>
            <td><label for="first-name">First Name:</label></td>
            <td><input type="text" id="first-name" name="first-name" /></td>
          </tr>
          <tr>
            <td><label for="last-name">Last Name:</label></td>
            <td><input type="text" id="last-name" name="last-name" /></td>
          </tr>
          <tr>
            <td><label for="email">Email:</label></td>
            <td><input type="email" id="email" name="email" /></td>
          </tr>
          <tr>
            <td><label for="phone">Phone:</label></td>
            <td><input type="tel" id="phone" name="phone" /></td>
          </tr>
          <tr>
            <td><label for="dob">Date of Birth:</label></td>
            <td><input type="date" id="dob" name="dob" /></td>
          </tr>
          <tr>
            <td>
              <label for="Gender">Gender:</label>
            </td>
            <td>
              <input type="radio" id="male" name="gender" value="male" />
              <label for="male">Male</label>
              <input type="radio" id="female" name="gender" value="female" />
              <label for="female">Female</label>
            </td>
          </tr>
        </table>
      </fieldset>
    </form>

    <form action="">
      <fieldset>
        <legend>Academic Information</legend>
        <table>
          <tr>
            <td><label for="course">Select Course:</label></td>
            <td>
              <select id="course" name="course">
                <option value="" selected disabled>--Select a Course--</option>
                <option value="bscs">BSc Computer Science</option>
                <option value="bsse">BS Software Engineering</option>
                <option value="bscs">BSc Information Technology</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>
              <label for="Skills">Skills:</label>
            </td>
            <td>
              <input
                type="text"
                placeholder="Select or type a Skill"
                name="skills"
                size="25"
                list="Skills"
              />
              <datalist id="Skills">
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="C++">C++</option>
                <option value="C#">C#</option>
                <option value="PHP">PHP</option>
                <option value="SQL">SQL</option>
              </datalist>
            </td>
          </tr>
          <tr>
            <td>
              <label for="Address">Address:</label>
            </td>
            <td>
              <textarea
                name="address"
                id="Address"
                cols="30"
                rows="5"
              ></textarea>
            </td>
          </tr>
        </table>
      </fieldset>
    </form>

    <form action="">
        <fieldset>
            <legend>Login Credentials</legend>
            <table>
                <tr>
                    <td>
                        <label for="Username">Username:</label>
                    </td>
                    <td>
                        <input type="text" id="Username" name="Username" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Password">Password:</label>
                    </td>
                    <td>
                        <input type="password" id="Password" name="Password" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="Confirm-Password">Confirm Password:</label>
                    </td>
                    <td>
                        <input type="password" id="Confirm-Password" name="Confirm-Password" />
                    </td>
                </tr>
            </table>
        </fieldset>
    </form>
    <form action="">
        <fieldset>
            <legend>
                Declaration 
            </legend>
            <table>
                <tr>
                    <td>
                        <input type="checkbox" id="declaration" name="declaration" />
                        <label for="declaration">I agree to the terms and conditions.</label>
                    </td>
                </tr>
                <tr>
                    <th>
                        <button type="submit">Register</button>
                        <button type="reset">Reset</button>
                    </th>
                </tr>       
                    
            </table>
        </fieldset>
    </form>
  </body>
</html>
