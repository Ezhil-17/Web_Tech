<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Select (dropdown) in HTML</h1>
    <form action="">
      <label for="">State:</label>
      <select name="SelectedState" id="">
        <option value="" disabled selected>Select Your State</option>
        <option value="Tamilnadu">Tamilnadu</option>
        <option value="Karnataka">Karnataka</option>
        <option value="Andhra Pradesh">Andhra Pradesh</option>
        <option value="Maharashtra">Maharashtra</option>
      </select>
      <button>Sumbit</button>
    </form>
    <hr />
    <br />
    <h1>Select Your Job Role:</h1>
    <form action="">
      <label for="">Job:</label>
      <select name="SelectedCourse" id="">
        <option value="" disabled selected>---Role---</option>
        <option value="Frontend Developer">Frontend Developer</option>
        <option value="Backend Developer">Backend Developer</option>
        <option value="FullStack Developer">FullStack Developer</option>
        <option value="MERN">MERN Stack Developer</option>
        <option value="MEAN Stack">MEAN Stack Developer</option>
        <option value="Al ML Engineer">AI ML Engineer</option>
      </select>
      <button>Sumbit</button>
    </form>
  </body>
</html>
