<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h2>Video Tag in HTML</h2>

    controls
    poster="https://i.ytimg.com/vi/5qap5aO4i9A/maxresdefault.jpg"
    width="500"
    height="500"
    autoplay>
</video>
<br>
 <video
      src="./assets/Tom and Jerry A Night Before Christmas.mp4"
      controls
      poster="./assets/thumbnail.png"
      width="500"
      height="400"
    ></video><br>
    <hr />
    <video controls width="500" height="400" poster="./assets/thumbnail.png">
      <source
        src="./assets/Tom and Jerry A Night Before Christmas.mp4"
        type="video/mp4"
      />
    </video>

</html>
